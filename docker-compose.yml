version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: customer-service-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: customer_service
      MYSQL_USER: cs_user
      MYSQL_PASSWORD: cs_pass123
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - customer-service-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: customer-service-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      # MySQL 连接信息（通过 --env-file 覆盖）
      - DATABASE_URL=mysql+pymysql://cs_user:cs_pass123@mysql:3306/customer_service
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/xhs_screenshots:/app/xhs_screenshots
      - ./backend/chroma_db:/app/chroma_db
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - customer-service-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: customer-service-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - customer-service-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  customer-service-network:
    driver: bridge

volumes:
  mysql-data:
  backend-uploads:
  backend-chroma:
