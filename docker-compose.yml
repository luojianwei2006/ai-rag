version: '3.8'

services:
  # 后端服务（使用远程 MySQL：118.145.198.135）
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: customer-service-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      # 使用远程 MySQL（在 .env 中配置）
      - DATABASE_URL=mysql+pymysql://customer_service:HjNBWjKMz7YZG4kS@118.145.198.135:3306/customer_service
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/xhs_screenshots:/app/xhs_screenshots
      - ./backend/chroma_db:/app/chroma_db
    networks:
      - customer-service-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: customer-service-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - customer-service-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  customer-service-network:
    driver: bridge
