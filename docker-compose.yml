version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: customer-service-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # 从 .env 文件读取环境变量
      - PYTHONPATH=/app
    env_file:
      - ./backend/.env
    volumes:
      # 持久化数据
      - ./backend/uploads:/app/uploads
      - ./backend/xhs_screenshots:/app/xhs_screenshots
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/platform.db:/app/platform.db
    networks:
      - customer-service-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: customer-service-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - customer-service-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  # （可选）Nginx 反向代理（统一入口）
  # nginx:
  #   image: nginx:alpine
  #   container_name: customer-service-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "443:443"
  #     - "80:80"
  #   volumes:
  #     - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
  #     - ./ssl:/etc/nginx/ssl
  #   depends_on:
  #     - frontend
  #     - backend
  #   networks:
  #     - customer-service-network

networks:
  customer-service-network:
    driver: bridge

volumes:
  backend-uploads:
  backend-chroma:
  backend-db:
